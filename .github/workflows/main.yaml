name: Build and Push Docker Image for Question Answer Website Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CI_ENVIRONMENT_NAME: main

jobs:
  sca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk
        run: snyk auth $SNYK_TOKEN
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk test
        run: snyk test --org=${{ secrets.SNYK_ORG }} --project-name=question-answer-frontend
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  unit-test:
    needs: sca
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run tests
      run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Build the application
      run: npm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: .next
        retention-days: 1

  push:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      version_tag: ${{ steps.metadata.outputs.version_tag }}
      image_name: ${{ steps.metadata.outputs.image_name }}
      branch_name: ${{ steps.branch.outputs.branch_name }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: .next
        
    - name: Extract and sanitize branch name
      id: branch
      run: |
        BRANCH_NAME="${GITHUB_REF##*/}"
        SAFE_BRANCH=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | tr '/' '-' | tr '_' '-')
        echo "BRANCH_NAME=$SAFE_BRANCH" >> $GITHUB_ENV
        echo "branch_name=$SAFE_BRANCH" >> $GITHUB_OUTPUT

    - name: Read version values
      run: |
        SEMVER=$(jq -r .SemVer gitversion.json)
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "VERSION_TAG=$SEMVER" >> $GITHUB_ENV
        echo "OWNER=$OWNER" >> $GITHUB_ENV

  deploy:
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name != 'pull_request'
    steps:
    - name: Install ssh tools
      run: sudo apt-get update && sudo apt-get install -y openssh-client sshpass
    - name: Write SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.REMOTE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts
    - name: Show deploy values
      run: |
        echo "VERSION=${{ needs.push.outputs.version_tag }}"
        echo "IMAGE=${{ needs.push.outputs.image_name }}"
        echo "BRANCH=${{ needs.push.outputs.branch_name }}"
    - name: Deploy to remote server
      run: |
        ssh -i ~/.ssh/id_rsa "${{ secrets.REMOTE_USERNAME }}@${{ secrets.REMOTE_HOST }}" "
          cd /var/www/ &&
          ./${{ vars.DEPLOY_SCRIPT }} \
          -a '${{ vars.CONTAINER_TAG }}-frontend-${{ env.CI_ENVIRONMENT_NAME }}' \
          -u '${{ github.actor }}' \
          -p '${{ secrets.GITHUB_TOKEN }}' \
          -l '/var/www/${{ vars.DEPLOY_PATH }}' \
          -v '${{ needs.push.outputs.version_tag }}' \
          -r 'ghcr.io' \
          -e '${{ env.CI_ENVIRONMENT_NAME }}' \
          -x '${{ needs.push.outputs.image_name }}'
        "